name: Manuel Release Oluşturucu

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'v1.0.5'
        required: true
        default: 'v1.0.5'
      interface_version:
        description: ''
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Addon Klasörünü Hazırla ve TOC Güncelle
        run: |
          # 1. Dağıtım klasörünü oluştur
          FOLDER_NAME="pfQuest-bronzebeard-turkish-translations"
          mkdir -p "$FOLDER_NAME"
          
          # 2. Git dosyaları hariç her şeyi kopyala
          rsync -av --progress . "$FOLDER_NAME" --exclude .git --exclude .github
          
          # 3. .toc dosyasının adını bul (klasör içinde arıyoruz)
          TOC_FILE=$(find "$FOLDER_NAME" -maxdepth 1 -name "*.toc" | head -n 1)
          
          if [ -z "$TOC_FILE" ]; then
            echo "HATA: .toc dosyası bulunamadı!"
            exit 1
          fi
          
          echo "Bulunan TOC dosyası: $TOC_FILE"
          
          # 4. Version alanını güncelle (Giriş yapılan versiyon etiketini yazar)
          # '## Version:' ile başlayan satırı tamamen yeni versiyonla değiştirir
          sed -i "s/^## Version:.*/## Version: ${{ github.event.inputs.version_tag }}/g" "$TOC_FILE"
          
          # 5. Eğer kullanıcı yeni bir Interface sürümü girdiyse onu da güncelle
          if [ ! -z "${{ github.event.inputs.interface_version }}" ]; then
            sed -i "s/^## Interface:.*/## Interface: ${{ github.event.inputs.interface_version }}/g" "$TOC_FILE"
          fi
          
          # Güncellenmiş içeriği loglarda kontrol etmek için yazdıralım
          echo "--- Güncellenmiş TOC İçeriği ---"
          cat "$TOC_FILE" | grep -E "^## (Version|Interface):"
          
          # 6. Klasörü zipler
          zip -r "$FOLDER_NAME.zip" "$FOLDER_NAME"

      - name: GitHub Release Oluştur ve Dosyayı Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "Sürüm ${{ github.event.inputs.version_tag }}"
          body: |
            pfQuest Bronzebeard Türkçe Çeviri Güncellemesi.
            
            **Kurulum:** İndirdiğiniz zip dosyasını `Interface\AddOns\` klasörüne çıkarın.
          files: pfQuest-bronzebeard-turkish-translations.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}