name: Otomatik Release Oluşturucu

on:
  push:
    branches:
      - master # main
    paths-ignore:
      - '.github/**' # Workflow dosyası değiştiğinde kendi kendine sonsuz döngüye girmesin

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Sürüm Bilgilerini Hazırla
        id: vars
        run: |
          # Bugünün tarihini al (Yıl.Ay.Gün formatında, Örn: 2026.05.23)
          DATE=$(date +'%Y.%m.%d')
          # Commit'in ilk 7 haneli kısa ID'sini al (Örn: a1b2c3d)
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # Benzersiz bir tag oluşturuyoruz (Örn: v2026.05.23-a1b2c3d)
          TAG_NAME="v${DATE}-${SHA}"
          
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "Oluşturulan Benzersiz Etiket: ${TAG_NAME}"

      - name: Addon Klasörünü Hazırla ve TOC Güncelle
        run: |
          FOLDER_NAME="pfQuest-bronzebeard-turkish-translations"
          mkdir -p "$FOLDER_NAME"
          
          # Git dosyaları hariç her şeyi kopyala
          rsync -av --progress . "$FOLDER_NAME" --exclude .git --exclude .github
          
          # .toc dosyasını bul
          TOC_FILE=$(find "$FOLDER_NAME" -maxdepth 1 -name "*.toc" | head -n 1)
          
          if [ -z "$TOC_FILE" ]; then
            echo "HATA: .toc dosyası bulunamadı!"
            exit 1
          fi
          
          # .toc dosyasındaki '## Version:' satırını otomatik oluşturduğumuz etiketle değiştir
          sed -i "s/^## Version:.*/## Version: ${{ steps.vars.outputs.tag_name }}/g" "$TOC_FILE"
          
          echo "--- Güncellenmiş TOC İçeriği ---"
          cat "$TOC_FILE" | grep -E "^## Version:"
          
          # Klasörü zipler
          zip -r "$FOLDER_NAME.zip" "$FOLDER_NAME"

      - name: GitHub Release Oluştur ve Dosyayı Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: "Sürüm ${{ steps.vars.outputs.tag_name }}"
          body: |
            Otomatik pfQuest Bronzebeard Türkçe Çeviri Güncellemesi.
            
            **Commit Mesajı:** ${{ github.event.head_commit.message }}
            **Kurulum:** İndirdiğiniz zip dosyasını `Interface\AddOns\` klasörüne çıkarın.
          files: pfQuest-bronzebeard-turkish-translations.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}