name: Otomatik Release Oluşturucu

on:
  push:
    branches:
      - main # Eğer ana branch adınız 'main' ise burayı main yapın
    paths-ignore:
      - '.github/**' # Sonsuz döngüyü engeller

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Sürüm Bilgilerini Hazırla
        id: vars
        run: |
          # Bugünün tarihini al (Format: YYYY.MM.DD)
          DATE=$(date +'%Y.%m.%d')
          # Commit'in kısa ID'sini al
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # Benzersiz tag (Örn: v2026.05.24-a1b2c3d)
          TAG_NAME="v${DATE}-${SHA}"
          
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Doğrudan Zip Oluştur
        run: |
          # Ana dizindeki (varsa) .toc dosyasının versiyonunu doğrudan güncelle
          # Eğer ileride .toc dosyası eklerseniz otomatik güncellenir, yoksa hata vermeden geçer
          TOC_FILE=$(find . -maxdepth 1 -name "*.toc" | head -n 1)
          if [ ! -z "$TOC_FILE" ]; then
            sed -i "s/^## Version:.*/## Version: ${{ steps.vars.outputs.tag_name }}/g" "$TOC_FILE"
            echo "--- TOC Dosyası Güncellendi ---"
            cat "$TOC_FILE" | grep "^## Version:"
          fi
          
          # Gereksiz git ve github klasörlerini dahil etmeden doğrudan ana dizini zipler
          zip -r pfQuest-bronzebeard-turkish-translations.zip . -x "*.git*" -x "*.github*"

      - name: GitHub Release Oluştur ve Dosyayı Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: "Sürüm ${{ steps.vars.outputs.tag_name }}"
          body: |
            Otomatik pfQuest Bronzebeard Türkçe Çeviri Güncellemesi.
            
            **Son Değişiklik:** ${{ github.event.head_commit.message }}
          files: pfQuest-bronzebeard-turkish-translations.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}