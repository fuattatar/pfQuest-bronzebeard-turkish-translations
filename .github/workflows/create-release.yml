name: Otomatik Release Oluşturucu

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**' # Sonsuz döngüyü engeller

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Sürüm Bilgilerini Hazırla
        id: vars
        run: |
          # Bugünün tarihini al (Format: YYYY.MM.DD)
          DATE=$(date +'%Y.%m.%d')
          # Commit'in kısa ID'sini al
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          # Benzersiz tag (Örn: v2026.05.23-a1b2c3d)
          TAG_NAME="v${DATE}-${SHA}"
          
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Addon Klasörünü Hazırla ve TOC Güncelle
        run: |
          FOLDER_NAME="pfQuest-bronzebeard-turkish-translations"
          mkdir -p "$FOLDER_NAME"
          
          # Git dosyaları hariç her şeyi oluşturduğumuz klasöre kopyala
          rsync -av --progress . "$FOLDER_NAME" --exclude .git --exclude .github
          
          # Klasörün içindeki .toc dosyasını bul ve versiyonu güncelle
          TOC_FILE="${FOLDER_NAME}/${FOLDER_NAME}.toc"
          
          if [ -f "$TOC_FILE" ]; then
            sed -i "s/^## Version:.*/## Version: ${{ steps.vars.outputs.tag_name }}/g" "$TOC_FILE"
            echo "--- TOC Dosyası Başarıyla Güncellendi ---"
            cat "$TOC_FILE" | grep "^## Version:"
          else
            echo "UYARI: .toc dosyası klasör içinde bulunamadı!"
          fi
          
          # Klasörü zipler
          zip -r "$FOLDER_NAME.zip" "$FOLDER_NAME"

      - name: GitHub Release Oluştur ve Dosyayı Yükle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: "Sürüm ${{ steps.vars.outputs.tag_name }}"
          body: |
            Otomatik pfQuest Bronzebeard Türkçe Çeviri Güncellemesi.
            
            **Son Değişiklik:** ${{ github.event.head_commit.message }}
            **Kurulum:** İndirdiğiniz zip dosyasını `Interface\AddOns\` klasörüne çıkarın.
          files: pfQuest-bronzebeard-turkish-translations.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}